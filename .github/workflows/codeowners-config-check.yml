# codeowners-config-check.yml
# Always runs on every PR (F6 fix — no paths filter).
# Fast no-op pass when CODEOWNERS/rules not changed.
# Job name = 'codeowners-config-check' (R3.2) — matches branch-protection required-check context.
name: codeowners-config-check
on:
  pull_request:
permissions:
  contents: read
jobs:
  codeowners-config-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Decide scope (fast no-op pass when unrelated)
        id: scope
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$base" "$head" | grep -qE '^\.github/CODEOWNERS$|^\.claude/workflow-rules\.json$'; then
            echo "run_check=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_check=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Verify effective owner (R4.3 + R5.4 + R6.2 in-order last-match + canonical owner)
        if: steps.scope.outputs.run_check == 'true'
        run: |
          python3 - <<'PY'
          import json, sys, fnmatch
          d = json.load(open('.claude/workflow-rules.json'))
          required = set(d['codeowners_required_globs'])
          canonical_owner = d.get('canonical_codeowner')
          if not canonical_owner or not canonical_owner.startswith('@'):
              print(f'FAIL: canonical_codeowner missing or malformed: {canonical_owner}'); sys.exit(1)

          ordered_rules = []
          with open('.github/CODEOWNERS') as f:
              for line in f:
                  s = line.strip()
                  if not s or s.startswith('#'): continue
                  parts = s.split()
                  if len(parts) < 2: continue
                  ordered_rules.append((parts[0], parts[1:]))

          def effective_owners(test_path):
              last_match = None
              for pat, owners in ordered_rules:
                  pnorm = pat.lstrip('/')
                  if fnmatch.fnmatch(test_path, pnorm) or fnmatch.fnmatch(test_path, pat):
                      last_match = owners
              return last_match

          wrong = []
          for r in required:
              test_path = r.replace('**', 'x').replace('*', 'x').lstrip('/')
              eff = effective_owners(test_path)
              if eff is None:
                  wrong.append(f'{r}: no matching CODEOWNERS rule')
              elif canonical_owner not in eff:
                  wrong.append(f'{r}: effective owners {eff}, expected includes {canonical_owner}')

          if wrong:
              for e in wrong: print('FAIL:', e)
              sys.exit(1)
          print(f'PASS: every required glob resolves to canonical owner {canonical_owner}')
          PY
      - name: No-op pass
        if: steps.scope.outputs.run_check == 'false'
        run: echo "No CODEOWNERS/rules changes; no-op pass"
