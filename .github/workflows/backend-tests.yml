name: Backend Tests

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'pytest.ini'
      - 'tests/contract-fixtures/**'
      - '.github/workflows/backend-tests.yml'
  push:
    branches: [main]

# Trust-boundary 硬化（对齐 schema-smoke.yml / openapi-smoke.yml 约定）:
# - 最小权限：只读仓库内容，无写作用域
# - actions 钉完整 SHA
permissions:
  contents: read

jobs:
  pytest:
    name: backend pytest (full suite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Setup Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: '3.11'
      - name: Install test deps
        working-directory: backend
        run: python -m pip install -r requirements-test.txt
      # backend/tests/__init__.py 使 pytest 把 backend/ 注入 sys.path（与 CWD 无关）；
      # working-directory: backend + python -m pytest 为习惯与稳健标准形。
      # skip 守卫：本仓有 pytest.importorskip("apscheduler")，若 requirements-test.txt
      # 漂移丢了可选依赖，裸 pytest 会绿着 skip 掉这些用例 = 静默覆盖缺口。
      # 故解析 junit XML，任何 skipped>0 即 fail（codex branch review medium finding）。
      # 注：此守卫把「任何 skip」都当失败（今天仅 4 处 importorskip，无无条件 skip）；
      # 将来若引入合法的 @pytest.mark.skip/xfail，需在此改为对其 allowlist。
      - name: Run full backend suite (fail on any skip)
        working-directory: backend
        run: |
          python -m pytest tests/ -q -rs --junitxml="${RUNNER_TEMP:-/tmp}/pytest-report.xml"
          python - <<'PY'
          import os, sys, xml.etree.ElementTree as ET
          path = os.path.join(os.environ.get("RUNNER_TEMP") or "/tmp", "pytest-report.xml")
          root = ET.parse(path).getroot()
          skipped = sum(int(s.get("skipped", 0)) for s in root.iter("testsuite"))
          if skipped:
              print(f"FAIL: {skipped} skipped test(s) — requirements-test.txt 漂移/覆盖缺口，CI 拒绝静默 skip")
              sys.exit(1)
          print("OK: 0 skipped")
          PY
