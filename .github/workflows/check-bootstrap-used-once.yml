# check-bootstrap-used-once.yml (F1+F2 fix)
# Always runs on every PR; reads lock from BASE branch state + enforces single-use semantics.
# Job name = 'check-bootstrap-used-once' — matches branch-protection required-check context.
name: check-bootstrap-used-once
on:
  pull_request:
permissions:
  contents: read
jobs:
  check-bootstrap-used-once:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout BASE branch to read authoritative lock (F2 fix)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
      - name: Evaluate bootstrap lock against this PR (F1+F2)
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let lock = { consumed: false };
            try {
              lock = JSON.parse(fs.readFileSync('.github/bootstrap-lock.json', 'utf-8'));
            } catch (e) {
              core.setFailed(`Cannot read base-branch bootstrap-lock.json: ${e.message}`);
              return;
            }
            // PR body from event payload (F1: never interpolated into shell)
            const body = (context.payload.pull_request && context.payload.pull_request.body) || '';
            const prNumber = context.payload.pull_request.number;
            const prHead = context.payload.pull_request.head.sha;
            const claimsBootstrap = /^bootstrap:\s*true|^this is.*bootstrap|bootstrap exemption/im.test(body);

            const consumed = lock.consumed;
            const consumedIsTrue = consumed && consumed !== false && consumed !== 'false' && consumed !== 'None';

            // Expiry check
            if (lock.expiry_utc) {
              const expiry = new Date(lock.expiry_utc).getTime();
              if (!isNaN(expiry) && Date.now() > expiry) {
                core.setFailed(`Bootstrap lock expired at ${lock.expiry_utc}; cannot bootstrap`);
                return;
              }
            }

            if (consumedIsTrue) {
              if (claimsBootstrap) {
                core.setFailed(`Bootstrap lock already consumed at ${consumed}; this PR cannot re-claim bootstrap`);
                return;
              }
              console.log('PASS: bootstrap lock consumed; PR does not claim bootstrap.');
              return;
            }

            // consumed == false on base: this must be THE registered bootstrap PR
            if (claimsBootstrap) {
              if (lock.pr_number && lock.pr_number !== prNumber) {
                core.setFailed(`Bootstrap claimed but PR #${prNumber} != registered PR #${lock.pr_number}`);
                return;
              }
              if (lock.pr_head_sha && lock.pr_head_sha !== prHead) {
                console.log(`WARN: bootstrap PR head ${prHead} != initially registered ${lock.pr_head_sha}; recent commits expected, allowing`);
              }
              console.log(`PASS: recognized bootstrap PR #${prNumber} head=${prHead}`);
              return;
            }

            // No bootstrap claim and lock not consumed — allow (pre-bootstrap state)
            console.log('PASS: pre-bootstrap state, PR does not claim bootstrap.');
