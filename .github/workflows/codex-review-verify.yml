# codex-review-verify.yml
# workflow_run triggered — runs BASE branch code; PR cannot replace this workflow.
# Has OPENAI_API_KEY + checks:write. Derives authoritative SHAs from GitHub API (R6.1).
# Uses @openai/codex (npm) + openai/codex-plugin-cc (git) per codex.pin.json.
name: codex-review-verify
on:
  workflow_run:
    workflows: [codex-review-collect]
    types: [completed]
permissions:
  contents: read
  pull-requests: read
  checks: write
  actions: read
jobs:
  verify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' }}
    environment: codex-review
    steps:
      - name: Checkout BASE branch (authoritative workflow code)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Download PR metadata (advisory)
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: pr-metadata
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Load SHAs from artifact (advisory only)
        id: sha_artifact
        run: |
          base=$(cat pr-base.txt | tr -d '[:space:]')
          head=$(cat pr-head.txt | tr -d '[:space:]')
          num=$(cat pr-number.txt | tr -d '[:space:]')
          [ -z "$base" ] || [ -z "$head" ] && { echo "FAIL: empty artifact SHA"; exit 1; }
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "head=$head" >> "$GITHUB_OUTPUT"
          echo "number=$num" >> "$GITHUB_OUTPUT"

      - name: Derive authoritative SHAs from GitHub API (R6.1)
        id: sha
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prs = context.payload.workflow_run.pull_requests || [];
            if (!prs.length) { core.setFailed('no PR associated with workflow_run'); return; }
            const pr = prs[0];
            const { data } = await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: pr.number
            });
            const apiHead = data.head.sha;
            const apiBase = data.base.sha;
            const wrHead = context.payload.workflow_run.head_sha;
            const artifactHead = '${{ steps.sha_artifact.outputs.head }}';
            const artifactBase = '${{ steps.sha_artifact.outputs.base }}';
            if (artifactHead !== apiHead) core.setFailed(`head mismatch: artifact=${artifactHead} api=${apiHead}`);
            if (artifactBase !== apiBase) core.setFailed(`base mismatch: artifact=${artifactBase} api=${apiBase}`);
            if (wrHead !== apiHead) core.setFailed(`workflow_run head=${wrHead} != api head=${apiHead}`);
            core.setOutput('base', apiBase);
            core.setOutput('head', apiHead);
            core.setOutput('number', pr.number);

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with: { node-version: '20' }

      - name: Install Codex CLI (pinned @openai/codex via npm)
        run: |
          CLI_VERSION=$(python3 -c "import json; print(json.load(open('codex.pin.json'))['codex_cli']['version'])")
          npm install -g "@openai/codex@${CLI_VERSION}"
          codex --version

      - name: Clone codex-plugin-cc at pinned tag + verify commit
        run: |
          TAG=$(python3 -c "import json; print(json.load(open('codex.pin.json'))['codex_plugin_cc']['tag'])")
          EXPECTED_COMMIT=$(python3 -c "import json; print(json.load(open('codex.pin.json'))['codex_plugin_cc']['commit_sha'])")
          git clone --depth 1 --branch "$TAG" https://github.com/openai/codex-plugin-cc.git .github/codex-plugin
          ACTUAL_COMMIT=$(cd .github/codex-plugin && git rev-parse HEAD)
          if [ "$EXPECTED_COMMIT" != "$ACTUAL_COMMIT" ]; then
            echo "FAIL: codex-plugin-cc commit mismatch. pin=$EXPECTED_COMMIT actual=$ACTUAL_COMMIT"
            exit 1
          fi
          echo "Plugin verified at commit $ACTUAL_COMMIT"

      - name: Verify plugin file tree integrity
        run: node .claude/scripts/verify-codex-tree.mjs codex.pin.json .github/codex-plugin/plugins/codex

      - name: Checkout PR head in subdir (full depth)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ steps.sha.outputs.head }}
          path: pr-head
          fetch-depth: 0

      - name: Verify both base + head exist in pr-head
        working-directory: pr-head
        run: |
          git fetch origin "${{ steps.sha.outputs.base }}" --depth=1 2>&1 || true
          git cat-file -e "${{ steps.sha.outputs.base }}" || { echo "FAIL: base SHA missing"; exit 1; }
          git cat-file -e "${{ steps.sha.outputs.head }}" || { echo "FAIL: head SHA missing"; exit 1; }

      - name: Run Codex adversarial-review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        working-directory: pr-head
        run: |
          PLUGIN_DIR="$GITHUB_WORKSPACE/.github/codex-plugin/plugins/codex"
          export CLAUDE_PLUGIN_ROOT="$PLUGIN_DIR"
          node "$PLUGIN_DIR/scripts/codex-companion.mjs" adversarial-review \
            --wait --scope branch \
            --base "${{ steps.sha.outputs.base }}" \
            > "$GITHUB_WORKSPACE/verdict-full.txt" 2>&1 || true
          echo "--- last 20 lines ---"
          tail -20 "$GITHUB_WORKSPACE/verdict-full.txt" || true

      - name: Parse verdict from codex output
        id: verdict
        run: |
          VERDICT=$(grep -oE '"verdict":[[:space:]]*"[a-z-]+"' "$GITHUB_WORKSPACE/verdict-full.txt" | head -1 | sed -E 's/.*"verdict":[[:space:]]*"([a-z-]+)".*/\1/')
          [ -z "$VERDICT" ] && VERDICT="needs-attention"
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "Parsed verdict: $VERDICT"

      - name: Post codex-verify-pass check-run + PR comment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs'), crypto = require('crypto');
            const verdict = '${{ steps.verdict.outputs.verdict }}';
            const body = fs.readFileSync(process.env.GITHUB_WORKSPACE + '/verdict-full.txt', 'utf-8');
            const digest = crypto.createHash('sha256').update(body).digest('hex');
            await github.rest.checks.create({
              owner: context.repo.owner, repo: context.repo.repo,
              name: 'codex-verify-pass',
              head_sha: '${{ steps.sha.outputs.head }}',
              status: 'completed',
              conclusion: verdict === 'approve' ? 'success' : 'failure',
              output: {
                title: `Codex verdict: ${verdict}`,
                summary: `codex_json_digest=${digest}\nreview_target_sha=${{ steps.sha.outputs.head }}\nbase=${{ steps.sha.outputs.base }}\n\n` + body.substring(0, 60000)
              }
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: ${{ steps.sha.outputs.number }},
              body: '```\n' + body.substring(0, 60000) + '\n```'
            });
