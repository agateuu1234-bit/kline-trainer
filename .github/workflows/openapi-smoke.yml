name: OpenAPI Smoke Test

on:
  pull_request:
    paths:
      - 'backend/openapi.yaml'
      - 'backend/tests/test_openapi.py'
      - 'backend/requirements-dev.txt'
      - '.github/workflows/openapi-smoke.yml'
  push:
    branches: [main]

# Trust-boundary hardening（对齐 Plan 1 R10 + project convention）:
# - Least-privilege token: read-only repo contents, no write scopes
# - actions pinned to full SHA to match codeowners-config-check.yml / schema-smoke.yml
permissions:
  contents: read

jobs:
  openapi-validate:
    name: OpenAPI 3.0 spec + contract invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Setup Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: '3.11'
      - name: Install dev deps
        working-directory: backend
        run: python -m pip install -r requirements-dev.txt
      - name: Run OpenAPI pytest
        working-directory: backend
        run: python -m pytest tests/test_openapi.py -v
