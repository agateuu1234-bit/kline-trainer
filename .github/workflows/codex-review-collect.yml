# codex-review-collect.yml
# PR-triggered stage 1: gather PR metadata as artifact.
# NO secrets, NO write permissions — safe to run PR-branch code here.
name: codex-review-collect
on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
permissions:
  contents: read
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Record PR SHAs + changed files
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          num="${{ github.event.pull_request.number }}"
          echo "$base" > pr-base.txt
          echo "$head" > pr-head.txt
          echo "$num"  > pr-number.txt
          git diff --name-only "$base" "$head" > changed.txt || true
          echo "Collected PR #$num base=$base head=$head"
          wc -l changed.txt || true
      - name: Upload PR metadata artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: pr-metadata
          path: |
            pr-base.txt
            pr-head.txt
            pr-number.txt
            changed.txt
          if-no-files-found: error
